# Minimal Prometheus config for the `amalgam` metrics example.
#
#   docker compose up -d prometheus
#   cargo run --example prometheus --features metrics   # serves :9000/metrics on the host
#   open http://localhost:9090                          # Prometheus UI; query e.g. amalgam_hits_total
#
# The example binds its scrape endpoint to 0.0.0.0:9000 on the host; from inside
# the Prometheus container the host is reachable as `host.docker.internal`
# (wired up via `extra_hosts` in docker-compose.yml).
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: amalgam
    metrics_path: /metrics
    static_configs:
      - targets:
          - "host.docker.internal:9000"
